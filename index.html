<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripted - Legal Documents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #734D80 0%, #5A3D66 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #734D80;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .tagline {
            color: #666;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        a {
            display: block;
            padding: 16px 24px;
            background: #734D80;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        a:hover {
            background: #5A3D66;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(115, 77, 128, 0.3);
        }

        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Scripted</h1>
        <p class="tagline">AI-Powered Manifestation Scripts</p>

        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms & Conditions</a>
        </div>

        <div class="footer">
            <p>© 2025 Scripted. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
